name: CI — marketing-service

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/services/marketing-service/**'
      - 'src/services/_template/**'
  pull_request:
    paths:
      - 'src/services/marketing-service/**'
      - 'src/services/_template/**'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/services/marketing-service/CrmPlatform.MarketingService.csproj

      - name: Build
        run: |
          dotnet build src/services/marketing-service/CrmPlatform.MarketingService.csproj \
            --no-restore \
            --configuration Release \
            -warnaserror

      - name: Test with coverage
        run: |
          dotnet test src/services/marketing-service/Tests/CrmPlatform.MarketingService.Tests.csproj \
            --no-restore \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Coverage gate — 80% minimum
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '80 90'

      - name: Run tenant isolation tests
        run: |
          dotnet test src/services/marketing-service/Tests/CrmPlatform.MarketingService.Tests.csproj \
            --no-restore \
            --configuration Release \
            --filter "Category=TenantIsolation" \
            --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-service-test-results
          path: |
            ./coverage/**/*.xml
            ./**/*.trx
